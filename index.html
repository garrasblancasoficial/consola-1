<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garras Blancas OS - Booting...</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <style>
        /* --- ESTILOS DE CARGA (BOOT) --- */
        #boot-screen {
            background-color: #000;
            color: #ccc;
            font-family: 'VT323', monospace;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .loading-bar-container {
            width: 300px;
            height: 20px;
            border: 2px solid #ccc;
            margin-top: 20px;
            position: relative;
        }

        #loading-bar {
            width: 0%;
            height: 100%;
            background-color: #ccc;
            transition: width 0.2s linear;
        }

        .boot-text { font-size: 1.5rem; margin: 5px 0; }

        /* --- ESTILOS WINDOWS 95 (ESCRITORIO) --- */
        body {
            background-color: #008080;
            font-family: 'Tahoma', sans-serif;
            margin: 0; overflow: hidden; height: 100vh;
        }

        .window {
            width: 400px; background-color: #c0c0c0;
            border: 2px solid; border-color: #fff #0a0a0a #0a0a0a #fff;
            position: absolute; top: 15%; left: 15%; padding: 2px;
            display: none; /* Se activa al final de la carga */
        }

        .window-title {
            background-color: #000080; color: white; padding: 3px 8px;
            font-weight: bold; display: flex; justify-content: space-between;
        }

        .window-content {
            padding: 15px; background-color: #fff; margin: 2px;
            border: 1px solid #0a0a0a; color: #000;
        }

        .taskbar {
            position: absolute; bottom: 0; left: 0; width: 100%;
            height: 30px; background-color: #c0c0c0;
            border-top: 2px solid #fff; display: flex; align-items: center;
        }

        .start-btn {
            border: 2px solid; border-color: #fff #0a0a0a #0a0a0a #fff;
            padding: 2px 8px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body onload="iniciarBoot()">

    <div id="boot-screen">
        <div class="boot-text">GARRAS BLANCAS BIOS V.4.0 (C) 1995-2026</div>
        <div class="boot-text">PROCESADOR: REBEL-CORE 9000... OK</div>
        <div class="boot-text">MEMORIA: 640KB RAM... OK</div>
        <div class="boot-text">> INICIANDO PROTOCOLO BÚNKER...</div>
        
        <div class="loading-bar-container">
            <div id="loading-bar"></div>
        </div>
        <div class="boot-text" id="porcentaje">0%</div>
        <div class="boot-text" id="status-text" style="margin-top:20px;">Cargando archivos de Minecraft...</div>
    </div>

    <div class="window" id="main-window">
        <div class="window-title">
            <span>Bienvenido a Saúl-OS</span>
            <div style="cursor:pointer" onclick="document.getElementById('main-window').style.display='none'">[X]</div>
        </div>
        <div class="window-content">
            <p style="font-family: 'VT323', monospace; font-size: 1.2rem;">SISTEMA CARGADO CON ÉXITO.</p>
            <p>El búnker de las Garras Blancas está operativo.</p>
            <button style="background:#c0c0c0; border: 2px solid; border-color: #fff #0a0a0a #0a0a0a #fff; padding: 5px 15px;" onclick="alert('¡Rebelión confirmada!')">Entrar</button>
        </div>
    </div>

    <div class="taskbar">
        <div class="start-btn">Inicio</div>
    </div>

    <script>
        function iniciarBoot() {
            let barra = document.getElementById('loading-bar');
            let porcTxt = document.getElementById('porcentaje');
            let statusTxt = document.getElementById('status-text');
            let ancho = 0;
            
            let intervalo = setInterval(() => {
                ancho += Math.floor(Math.random() * 10); // Carga aleatoria
                if (ancho >= 100) {
                    ancho = 100;
                    clearInterval(intervalo);
                    setTimeout(finalizarCarga, 500);
                }
                barra.style.width = ancho + "%";
                porcTxt.innerText = ancho + "%";
                
                if(ancho > 40) statusTxt.innerText = "Sincronizando con el servidor de Garras Blancas...";
                if(ancho > 80) statusTxt.innerText = "Preparando interfaz gráfica...";
            }, 200);
        }

        function finalizarCarga() {
            document.getElementById('boot-screen').style.display = 'none';
            document.getElementById('main-window').style.display = 'block';
        }
    </script>

</body>
</html>
