<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garras Blancas OS - Búnker Digital</title>
    
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. ESTILOS DE LA CARGA (BIOS) --- */
        #boot-screen {
            background-color: #000;
            color: #ccc;
            font-family: 'VT323', monospace;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .loader-bar {
            width: 300px;
            height: 20px;
            border: 2px solid #ccc;
            margin: 20px 0;
            position: relative;
        }

        #progress {
            width: 0%;
            height: 100%;
            background-color: #ccc;
        }

        /* --- 2. ESTILOS WINDOWS 95 (ESCRITORIO) --- */
        body {
            background-color: #008080; /* Verde azulado clásico */
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            font-family: 'Tahoma', 'Arial', sans-serif;
        }

        /* La Ventana Gris */
        .window {
            width: 380px;
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #0a0a0a #0a0a0a #ffffff;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 2px;
            display: none; /* Se oculta hasta que termine la carga */
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        .title-bar {
            background-color: #000080;
            color: white;
            padding: 3px 10px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content {
            background-color: #fff;
            margin: 2px;
            border: 1px solid #000;
            padding: 20px;
            text-align: center;
            color: #000;
        }

        /* Botón Estilo Win95 */
        .win-btn {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #0a0a0a #0a0a0a #ffffff;
            padding: 5px 20px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 15px;
        }

        .win-btn:active {
            border-color: #0a0a0a #ffffff #ffffff #0a0a0a;
        }
    </style>
</head>
<body onload="ejecutarBoot()">

    <div id="boot-screen">
        <div style="font-size: 1.8rem;">GARRAS BLANCAS BIOS V.4.0</div>
        <div style="margin-top: 10px;">> CPU: REBEL-CHIP... OK</div>
        <div style="margin-top: 5px;">> CARGANDO PROTOCOLOS DE MINECRAFT...</div>
        <div class="loader-bar">
            <div id="progress"></div>
        </div>
        <div id="porcentaje" style="font-size: 1.5rem;">0%</div>
        <div id="status" style="margin-top: 10px; color: #888;">Preparando búnker...</div>
    </div>

    <div class="window" id="win95-window">
        <div class="title-bar">
            <span>Bienvenido a Saúl OS</span>
            <span style="cursor:pointer" onclick="cerrar()">[X]</span>
        </div>
        <div class="content">
            <h2 style="margin-top:0;">¡ACCESO EXITOSO!</h2>
            <p>Has entrado a la terminal oficial de las <strong>Garras Blancas</strong>.</p>
            <p>Todo está listo para el estreno de mañana en el búnker de Minecraft.</p>
            <button class="win-btn" onclick="alert('¡Rebelión activada! Nos vemos en el búnker.')">ACEPTAR</button>
        </div>
    </div>

    <script>
        function ejecutarBoot() {
            let barra = document.getElementById('progress');
            let txt = document.getElementById('porcentaje');
            let status = document.getElementById('status');
            let carga = 0;

            let intervalo = setInterval(() => {
                carga += Math.floor(Math.random() * 8) + 1; // Carga de forma irregular para que sea realista
                
                if (carga >= 100) {
                    carga = 100;
                    clearInterval(intervalo);
                    setTimeout(() => {
                        // AQUÍ SE HACE EL CAMBIO:
                        document.getElementById('boot-screen').style.display = 'none';
                        document.getElementById('win95-window').style.display = 'block';
                    }, 500);
                }

                barra.style.width = carga + "%";
                txt.innerText = carga + "%";

                if (carga > 50) status.innerText = "Iniciando entorno gráfico...";
                if (carga > 85) status.innerText = "Conectando con la Rebelión...";
            }, 150);
        }

        function cerrar() {
            document.getElementById('win95-window').style.display = 'none';
        }
    </script>

</body>
</html>
